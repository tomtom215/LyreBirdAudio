# LyreBirdAudio Log Rotation Configuration
# Prevents disk exhaustion from log accumulation
#
# Installation:
#   sudo cp config/lyrebird-logrotate.conf /etc/logrotate.d/lyrebird
#
# Test configuration:
#   sudo logrotate -d /etc/logrotate.d/lyrebird
#
# Force immediate rotation:
#   sudo logrotate -f /etc/logrotate.d/lyrebird

# MediaMTX server log.
# copytruncate: MediaMTX's stdout is an inherited redirect (or systemd append:),
# a held-open fd that does not reopen on signal. create + `systemctl kill -HUP`
# left MediaMTX writing to the rotated (unlinked) inode, which then grew
# invisibly until the disk filled. Copy-then-truncate-in-place preserves the fd.
/var/log/mediamtx.out {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    size 50M
}

# Stream manager logs.
# copytruncate: the log is held open by systemd (StandardOutput=append:), and the
# script traps USR1 for a status dump, NOT a log reopen -- so create + USR1 did
# not rotate effectively. Truncate in place instead.
/var/log/lyrebird-stream-manager.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    size 20M
    sharedscripts
}

# FFmpeg per-device logs (multiple files in directory).
# copytruncate: each FFmpeg holds its log open and does not reopen on rotate.
/var/log/lyrebird/*.log {
    daily
    rotate 3
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    size 10M
    sharedscripts

    # Keep recent logs for troubleshooting, but rotate aggressively
    # to prevent disk fill on devices with many microphones
}

# LyreBird orchestrator and updater logs
/var/log/lyrebird-orchestrator.log
/var/log/lyrebird-updater.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    size 10M
}

# Diagnostics log (rarely written, keep longer)
/var/log/lyrebird-diagnostics.log {
    monthly
    rotate 6
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    size 5M
}

# USB audio mapper logs
/var/log/usb-audio-mapper.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    size 5M
}
